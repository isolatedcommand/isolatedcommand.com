<!-- Google Consent Mode v2 — defaults to denied until the visitor accepts.
     Must load before Google Analytics / Google Ads / GTM. -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  // Honour a previously stored choice so the banner doesn't reset consent.
  var icConsentGranted = document.cookie.indexOf('ic-consent=granted') !== -1;

  gtag('consent', 'default', {
    'ad_storage':            icConsentGranted ? 'granted' : 'denied',
    'ad_user_data':          icConsentGranted ? 'granted' : 'denied',
    'ad_personalization':    icConsentGranted ? 'granted' : 'denied',
    'analytics_storage':     icConsentGranted ? 'granted' : 'denied',
    'functionality_storage': 'granted',
    'security_storage':      'granted',
    'wait_for_update': 500
  });

  // Redact ad identifiers and pass click info via URL while consent is denied.
  gtag('set', 'ads_data_redaction', true);
  gtag('set', 'url_passthrough', true);
</script>
