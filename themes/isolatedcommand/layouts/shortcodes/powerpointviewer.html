<div class="ppt-container">

  <div class="ppt-actions">
    <a href="{{ .Get "src" }}" target="_blank" rel="noopener">
      Full Screen
    </a>
  </div>

  <iframe
    src="https://view.officeapps.live.com/op/embed.aspx?src={{ .Get "src" | urlquery }}"
    width="100%"
    height="{{ .Get "height" | default "900" }}"
    style="border:none;">
  </iframe>
</div>
