#################### default parameters ################################

# SEO: staging is kept out of the index; canonical points to production.
# When promoting to the production repo, set seo_noindex = false.
seo_noindex = false
canonical_base = "https://isolatedcommand.com"

favicon = "images/favicon.png"
logo = "images/logo.png"
logo_width = "300px"
logo_text = "Isolated Command"
navbar_fixed = false
description = "Isolated Command | No Boundaries, No Limits"
author = "conanzhangtech"
image = "images/logo.png" # this image will be used as fallback if a page has no image of its own
address_descriptors = false
email = "hello@isolatedcommand.com"
copyright = "This website is built with [Publisher](https://publisher.devcomm.isolatedcommand.com) by [Isolated Command Developer Community](https://devcomm.isolatedcommand.com) - Isolated Command 2026"
custom_script= ""
google_tag_manager = ""

######################## Color Variables (IsolatedCommand Brand) ########################
[variables]
color_primary = "#e80f12"        # Red (Isolated tag)
color_secondary = "#3071c4"      # Blue (Command text)
text_color = "#E8E4E0"           # Light warm text
text_dark = "#1a1410"            # Warm dark background
text_light = "#A8A49C"           # Warm muted gray
body_color = "#1a1410"           # Warm dark background
border_color = "#3071c4"         # Blue accent borders
black = "#000000"
white = "#FFFFFF"
light = "#2a2218"                # Warm light variant
font_primary = "Poppins"
font_primary_type = "sans-serif"
font_secondary = "Poppins"
font_secondary_type = "sans-serif"
font_icon = "Font Awesome 6 Free"
recaptcha_site_key = ""

[contact.form]
enable = false
use_netlify = false
use_recaptcha = true
action = "#"
success_image = ""

[preloader]
enable = true
preloader = "" # use jpg, png, svg or gif format.

[navigation_button]
enable = true
label = "get a quote"
link = "contact"


[matomo]
enable = false
url = "" # your matomo url
id = "" # your matomo id

[baidu]
enable = false
analytics_id = "" # Your ID

[plausible]
enable = false
domain = "" # yourdomain.com

[counter]
enable = false
id = "" # your site's counter.dev ID (`data-id` attribute value)
utc_offset = 0 # UTC time offset (`data-utcoffset` attribute value)

[site_verification]
google = "" # Your verification code
bing = "" # Your verification code
baidu = "" # Your verification code

[gmap]
enable = false
gmap_api = "AIzaSyCcABaamniA6OL5YvYSpB3pFMNrXwXnLwU"
map_latitude = "51.5223477"
map_longitude = "-0.1622023"
map_marker = "images/marker.png"

[cookies]
enable = true

######################## sidebar widgets #########################
[widgets]
sidebar = ["recent_posts", "taxonomy_category", "taxonomy_tags"]
# available widget : categories,tags,recent-post


